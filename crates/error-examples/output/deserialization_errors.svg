<svg width="740px" height="308px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #bdbdbd }
    .bg { fill: #0D1117 }
    .fg-bright-blue { fill: #85b4d7 }
    .fg-bright-red { fill: #e36b67 }
    .fg-yellow { fill: #f5db7d }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-yellow bold">warning</tspan><tspan class="bold">: unexpected key at `service.backend.unknown`</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan> </tspan><tspan class="fg-bright-blue bold">--&gt; </tspan><tspan>devsm.toml:2:1</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan class="fg-bright-blue bold">2</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan> unknown = "key"</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan> </tspan><tspan class="fg-yellow bold">^^^^^^^</tspan><tspan> </tspan><tspan class="fg-yellow bold">unexpected key</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="136px"><tspan class="fg-bright-red bold">error</tspan><tspan class="bold">: expected an integer, found string at `service.backend.port`</tspan>
</tspan>
    <tspan x="10px" y="154px"><tspan> </tspan><tspan class="fg-bright-blue bold">--&gt; </tspan><tspan>devsm.toml:3:8</tspan>
</tspan>
    <tspan x="10px" y="172px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="190px"><tspan class="fg-bright-blue bold">3</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan> port = "https"</tspan>
</tspan>
    <tspan x="10px" y="208px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>        </tspan><tspan class="fg-bright-red bold">^^^^^^^</tspan><tspan> </tspan><tspan class="fg-bright-red bold">expected an integer</tspan>
</tspan>
    <tspan x="10px" y="226px"><tspan class="fg-bright-red bold">error</tspan><tspan class="bold">: unknown variant "collapsed" at `service.backend.hidden`</tspan>
</tspan>
    <tspan x="10px" y="244px"><tspan> </tspan><tspan class="fg-bright-blue bold">--&gt; </tspan><tspan>devsm.toml:4:10</tspan>
</tspan>
    <tspan x="10px" y="262px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan>
</tspan>
    <tspan x="10px" y="280px"><tspan class="fg-bright-blue bold">4</tspan><tspan> </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan> hidden = "collapsed"</tspan>
</tspan>
    <tspan x="10px" y="298px"><tspan>  </tspan><tspan class="fg-bright-blue bold">|</tspan><tspan>          </tspan><tspan class="fg-bright-red bold">^^^^^^^^^^^</tspan><tspan> </tspan><tspan class="fg-bright-red bold">expected one of: visible, hidden, until-ran</tspan>
</tspan>
  </text>

</svg>
